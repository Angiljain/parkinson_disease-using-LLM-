# Configuration for PD Screening RAG System

# LLM Configuration
llm:
  provider: "groq"
  model: "llama-3.1-8b-instant"  # Fast and good quality
  temperature: 0.1
  max_tokens: 1500
  timeout: 45

# RAG Configuration
rag:
  vector_store: "chromadb"  # Options: chromadb, faiss
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5 # Number of relevant passages to retrieve
  similarity_threshold: 0.65

# Vector Store Paths
paths:
  knowledge_base: "./data/knowledge_base"
  vector_store: "./data/vector_store"
  chroma_persist: "./data/chroma_db"
  sample_transcripts: "./data/sample_transcripts.txt"
  logs: "./logs"

# Preprocessing Configuration
preprocessing:
  lowercase: true
  remove_punctuation: false  # Keep some punctuation for linguistic analysis
  remove_stopwords: false  # Stopwords may be relevant for PD screening
  min_word_count: 5  # Minimum words for valid transcript
  language: "en"

# Risk Assessment Thresholds
risk_assessment:
  high_risk_threshold: 0.7
  medium_risk_threshold: 0.4
  confidence_thresholds:
    high: 0.7
    medium: 0.5

weights:
    cardinal_symptoms: 1.3      # Strong weight for tremor, rigidity, bradykinesia
    speech_changes: 1.15        # Moderate weight for speech/voice changes
    writing_changes: 1.15       # Moderate weight for micrographia
    timeline_progression: 1.2   # Important for distinguishing PD from acute conditions
    asymmetry: 1.15            # Characteristic of PD
    family_observations: 1.1    # External validation is valuable
    multiple_domains: 1.25    

    min_word_count_high_confidence: 7
    min_symptoms_high_risk: 2
    min_domains_affected: 2

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "./logs/pd_screening.log"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  rotation: "10 MB"
  retention: "30 days"

# API Configuration (for Flask)
api:
  host: "0.0.0.0"
  port: 5000
  debug: false
  cors_enabled: true
  rate_limit: "100/hour"

# Streamlit Configuration
streamlit:
  page_title: "PD Screening Assistant"
  page_icon: "🧠"
  layout: "wide"
  theme: "dark"  # Options: light, dark
  show_metrics: true
  enable_history: true
  max_history_items: 50

# Medical Knowledge Sources
knowledge_sources:
  - "MDS-UPDRS guidelines"
  - "Parkinson's speech and language research papers"
  - "NIH Parkinson's information"
  - "Parkinson's Foundation summaries"
  - "Clinical neurology textbooks"
  - "Movement disorders research"

# Feature Flags
features:
  enable_caching: true
  enable_logging: true
  enable_metrics: true
  strict_json_validation: true
 
